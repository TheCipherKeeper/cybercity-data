id: city-b
name: "City B"
kind: finance
segment: corp

networks:
  - id: city-b-dmz
    kind: dmz
    cidr: 10.10.2.0/24

# `web` is a duplicate service id across orgs (city-a also has one) -> ids
# `web -> ghost` is a dangling link -> refs
services:
  - id: web
    name: "B web"
    kind: web
    exposure: public
    host: b.example
    network_id: city-b-dmz
    bind_ip: 10.10.2.10

links:
  - from_service: web
    to_service: ghost
    kind: api-call
    protocol: tcp/443
