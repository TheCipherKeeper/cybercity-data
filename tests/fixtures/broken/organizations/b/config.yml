id: b
name: "City B"
kind: finance
network_index: 2

networks:
  - id: b-dmz
    kind: dmz
    cidr: 10.2.2.0/24

# `web` is a duplicate service id across orgs (a also has one) -> ids
# `web -> ghost` is a dangling link -> refs
services:
  - id: web
    name: "B web"
    kind: web
    exposure: public
    host: b.example
    network_id: b-dmz
    bind_ip: 10.2.2.10

links:
  - from_service: web
    to_service: ghost
    kind: api-call
    protocol: tcp/443
