id: b
name: "City B"
kind: finance

networks:
  - id: b-dmz
    kind: dmz

# `web` is a duplicate service id across orgs (a also has one) -> ids
# `web -> ghost` is a dangling link -> refs
services:
  - id: web
    name: "B web"
    kind: web
    exposure: public
    host: b.example
    network_id: b-dmz

links:
  - from_service: web
    to_service: ghost
    kind: api-call
    protocol: tcp/443
