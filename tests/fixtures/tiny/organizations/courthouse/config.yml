id: courthouse
name: "City Courthouse"
kind: government
network_index: 11

description: |
  Test fixture: 1 org with 1 service and 1 cross-org link to hosp-web.

networks:
  - id: courthouse-dmz
    kind: dmz
    cidr: 10.11.11.0/24

services:
  - id: cour-web
    name: "Courthouse site"
    kind: web
    exposure: public
    host: www.courthouse.corp
    network_id: courthouse-dmz
    bind_ip: 10.11.11.10

links:
  - from_service: cour-web
    to_service: hosp-web
    kind: auth
    protocol: tcp/443
