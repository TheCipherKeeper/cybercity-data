id: courthouse
name: "City Courthouse"
kind: government

description: |
  Test fixture: 1 org with 1 service and 1 cross-org link to hosp-web.

networks:
  - id: courthouse-dmz
    kind: dmz

services:
  - id: cour-web
    name: "Courthouse site"
    kind: web
    exposure: public
    host: www.courthouse.corp
    network_id: courthouse-dmz

links:
  - from_service: cour-web
    to_service: hosp-web
    kind: auth
    protocol: tcp/443
