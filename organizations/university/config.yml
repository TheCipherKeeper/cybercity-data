id: university
name: "City State University"
kind: education

description: |
  Городской государственный университет. Обучает студентов, ведёт LMS,
  научные проекты и студенческий реестр. Дополняет школьный округ
  уровнем высшего образования.

networks:
  - id: university-dmz
    kind: dmz
  - id: university-lan
    kind: lan
  - id: university-mgmt
    kind: mgmt

services:
  - id: uni-web
    name: "University portal"
    kind: web
    exposure: public
    host: portal.university.edu
    network_id: university-dmz
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: high

  - id: uni-lms
    name: "University LMS"
    kind: web
    exposure: intranet
    host: lms.university.edu
    network_id: university-lan
    auth: sso
    data_classification: internal
    software:
      vendor: Moodle
      product: moodle
      version: "4.3"
    ports: [tcp/443]
    criticality: high

  - id: uni-db
    name: "University student DB"
    kind: db
    exposure: intranet
    host: db.university.edu
    network_id: university-lan
    auth: certificate
    data_classification: pii
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: critical

  - id: uni-wifi
    name: "University guest Wi-Fi"
    kind: iot
    exposure: public
    host: wifi.university.edu
    network_id: university-dmz
    auth: none
    data_classification: public
    ports: [tcp/80, tcp/443, udp/53]
    criticality: low

  - id: uni-backup
    name: "University backup"
    kind: backup
    exposure: intranet
    host: backup.university.edu
    network_id: university-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: high

links:
  - from_service: uni-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: uni-lms
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "LMS DNS resolution"

  - from_service: uni-lms
    to_service: uni-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "student records"

  - from_service: uni-wifi
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "captive portal DNS"

  - from_service: uni-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: uni-backup
    to_service: uni-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "student DB backup"

  - from_service: uni-lms
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "LMS audit logs"

  - from_service: uni-web
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO"

  - from_service: uni-lms
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "LMS SSO"

  - from_service: uni-lms
    to_service: nii-hpc
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "student research compute"
