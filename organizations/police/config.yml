id: police
name: "City Police Department"
kind: government

description: |
  Городское полицейское управление. Содержит критичные системы: базу данных
  дел, видеонаблюдение, радиосвязь и интеграцию с муниципальным SSO.

networks:
  - id: police-dmz
    kind: dmz
  - id: police-lan
    kind: lan
  - id: police-mgmt
    kind: mgmt

services:
  - id: police-web
    name: "Police public portal"
    kind: web
    exposure: public
    host: police.city.gov
    network_id: police-dmz
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.25.0"
    ports: [tcp/443, tcp/80]
    criticality: medium

  - id: police-cad
    name: "Police CAD"
    kind: web
    exposure: intranet
    host: cad.police.city.gov
    network_id: police-lan
    auth: mfa
    data_classification: restricted
    software:
      vendor: internal
      product: cad
      version: "5.0.0"
    ports: [tcp/443]
    criticality: critical

  - id: police-db
    name: "Police records DB"
    kind: db
    exposure: intranet
    host: db.police.city.gov
    network_id: police-lan
    auth: certificate
    data_classification: restricted
    software:
      vendor: Oracle
      product: DB
      version: "19.0.0.0"
    ports: [tcp/1521]
    criticality: critical

  - id: police-cctv
    name: "Police CCTV"
    kind: cctv
    exposure: intranet
    host: cctv.police.city.gov
    network_id: police-lan
    auth: certificate
    data_classification: restricted
    software:
      vendor: Motorola
      product: video
      version: "unknown"
    ports: [tcp/554]
    criticality: high

  - id: police-radio
    name: "Police radio gateway"
    kind: vpn
    exposure: intranet
    host: radio.police.city.gov
    network_id: police-lan
    auth: certificate
    data_classification: restricted
    software:
      vendor: Motorola
      product: p25gateway
      version: "unknown"
    ports: [udp/5060]
    criticality: critical

links:
  - from_service: police-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS"

  - from_service: police-cad
    to_service: police-db
    kind: db-read
    protocol: tcp/1521
    encryption: tls
    label: "CAD reads records"

  - from_service: police-cad
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "CAD DNS"

  - from_service: police-cctv
    to_service: hall-ntp
    kind: ntp-query
    protocol: udp/123
    encryption: none
    label: "CCTV time sync"

  - from_service: police-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "records DB audit logs"

  - from_service: police-radio
    to_service: hall-ntp
    kind: ntp-query
    protocol: udp/123
    encryption: none
    label: "radio gateway time sync"

  - from_service: police-web
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "public portal SSO via City Hall"

  - from_service: police-cad
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "CAD MFA via City Hall"
