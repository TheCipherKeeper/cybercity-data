id: nuclear-plant
name: "City Nuclear Power Plant"
kind: infra-utilities

description: |
  Городская атомная электростанция. Управляет реактором, турбинами,
  радиационным мониторингом и системами физической безопасности.
  OT-сегмент строго изолирован; связь с энергосетью и центром ЧС идёт
  через выделенный emergency API.

networks:
  - id: nuclear-plant-dmz
    kind: dmz
  - id: nuclear-plant-lan
    kind: lan
  - id: nuclear-plant-ot
    kind: ot
  - id: nuclear-plant-mgmt
    kind: mgmt

services:
  - id: npp-web
    name: "NPP public info"
    kind: web
    exposure: public
    host: portal.nuclear-plant.corp
    network_id: nuclear-plant-dmz
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: medium

  - id: npp-scada
    name: "NPP reactor SCADA"
    kind: ot
    exposure: ot
    host: scada.nuclear-plant.corp
    network_id: nuclear-plant-ot
    auth: certificate
    data_classification: restricted
    software:
      vendor: InductiveAutomation
      product: ignition
      version: "8.1"
    ports: [tcp/443, tcp/502]
    criticality: critical

  - id: npp-hmi
    name: "NPP operator HMI"
    kind: ot
    exposure: ot
    host: hmi.nuclear-plant.corp
    network_id: nuclear-plant-ot
    auth: local
    data_classification: restricted
    software:
      vendor: Aveva
      product: intouch
      version: "unknown"
    ports: [tcp/443]
    criticality: critical

  - id: npp-radiation
    name: "NPP radiation monitoring"
    kind: iot
    exposure: intranet
    host: radiation.nuclear-plant.corp
    network_id: nuclear-plant-lan
    auth: certificate
    data_classification: restricted
    software:
      vendor: Custom
      product: radiation-mon
      version: "unknown"
    ports: [tcp/443]
    criticality: critical

  - id: npp-db
    name: "NPP telemetry DB"
    kind: db
    exposure: intranet
    host: db.nuclear-plant.corp
    network_id: nuclear-plant-lan
    auth: certificate
    data_classification: restricted
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: critical

  - id: npp-backup
    name: "NPP backup"
    kind: backup
    exposure: intranet
    host: backup.nuclear-plant.corp
    network_id: nuclear-plant-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: high

  - id: npp-emergency
    name: "NPP emergency status API"
    kind: api
    exposure: intranet
    host: emergency.nuclear-plant.corp
    network_id: nuclear-plant-lan
    auth: mfa
    data_classification: restricted
    software:
      vendor: internal
      product: npp-emergency
      version: "1.0.0"
    ports: [tcp/443]
    criticality: critical

links:
  - from_service: npp-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: npp-web
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO via City Hall"

  - from_service: npp-scada
    to_service: hall-ntp
    kind: ntp-query
    protocol: udp/123
    encryption: none
    label: "OT time sync"

  - from_service: npp-scada
    to_service: npp-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "reactor telemetry"

  - from_service: npp-hmi
    to_service: npp-scada
    kind: api-call
    protocol: tcp/443
    encryption: none
    label: "HMI controls SCADA"

  - from_service: npp-hmi
    to_service: npp-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "operator telemetry"

  - from_service: npp-radiation
    to_service: npp-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "radiation logs"

  - from_service: npp-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: npp-backup
    to_service: npp-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "telemetry DB backup"

  - from_service: npp-emergency
    to_service: npp-scada
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "emergency reactor status"
