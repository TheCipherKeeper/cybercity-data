id: postal-service
name: "City Postal Service"
kind: retail

description: |
  Городская почтовая служба и логистика. Управляет посылками,
  адресной базой, сортировочными центрами и службой доставки.

networks:
  - id: postal-service-dmz
    kind: dmz
  - id: postal-service-lan
    kind: lan
  - id: postal-service-mgmt
    kind: mgmt

services:
  - id: post-web
    name: "Postal portal"
    kind: web
    exposure: public
    host: portal.postal-service.retail
    network_id: postal-service-dmz
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: medium

  - id: post-tracking
    name: "Parcel tracking"
    kind: api
    exposure: intranet
    host: tracking.postal-service.retail
    network_id: postal-service-lan
    auth: sso
    data_classification: internal
    software:
      vendor: Custom
      product: parcel-tracking
      version: "unknown"
    ports: [tcp/443]
    criticality: high

  - id: post-db
    name: "Postal parcels DB"
    kind: db
    exposure: intranet
    host: db.postal-service.retail
    network_id: postal-service-lan
    auth: certificate
    data_classification: pii
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: high

  - id: post-wifi
    name: "Post office Wi-Fi"
    kind: iot
    exposure: public
    host: wifi.postal-service.retail
    network_id: postal-service-dmz
    auth: none
    data_classification: public
    ports: [tcp/80, tcp/443, udp/53]
    criticality: low

  - id: post-backup
    name: "Postal backup"
    kind: backup
    exposure: intranet
    host: backup.postal-service.retail
    network_id: postal-service-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: medium

  - id: postal-idp
    name: "Postal SSO"
    kind: identity
    exposure: intranet
    host: idp.postal-service.retail
    network_id: postal-service-lan
    auth: mfa
    data_classification: restricted
    software:
      vendor: Keycloak
      product: keycloak
      version: "24.0"
    ports: [tcp/443]
    criticality: high

links:
  - from_service: post-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: post-tracking
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "tracking DNS resolution"

  - from_service: post-tracking
    to_service: post-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "parcel registry"

  - from_service: post-wifi
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "captive portal DNS"

  - from_service: post-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: post-web
    to_service: postal-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO"

  - from_service: post-tracking
    to_service: postal-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "tracking SSO"

  - from_service: post-backup
    to_service: post-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "parcels DB backup"
