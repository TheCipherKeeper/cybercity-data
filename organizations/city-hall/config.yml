id: city-hall
name: "City Hall"
kind: government
segment: corp

description: |
  Муниципальный центр города. Принимает налоговые декларации,
  ведёт реестр жителей, рассылает уведомления. Зарплатный
  проект - в City First Bank (см. link trusts hall-idp -> bank-idp).

third_party:
  - name: City First Bank
    role: payroll
    note: односторонний SSO-trust от hall-idp к bank-idp

tags:
  - public-services
  - mfa-mandated

regulated: []

notes:
  - "portal.city-hall.corp отдаёт публичную форму - entry point в сценариях"
  - "file-share содержит бюджетные документы, удобная цель для lateral movement"
  - "mail - основной канал фишинговых рассылок в городских сценариях"

networks:
  - id: city-hall-dmz
    kind: dmz
    cidr: 10.10.1.0/24
  - id: city-hall-lan
    kind: lan
    cidr: 10.10.129.0/24
  - id: city-hall-mgmt
    kind: mgmt
    cidr: 10.30.1.0/24

services:
  - id: hall-web
    name: "City Hall portal"
    kind: web
    exposure: public
    host: portal.city-hall.corp
    network_id: city-hall-dmz
    bind_ip: 10.10.1.10
    auth: sso
    data_classification: public
    software:
      vendor: Apache
      product: httpd
      version: "2.4.57"
    ports: [tcp/443, tcp/80]
    owner_team: ict

  - id: hall-mail
    name: "City Hall mail"
    kind: mail
    exposure: intranet
    host: mail.city-hall.corp
    network_id: city-hall-lan
    bind_ip: 10.10.129.10
    auth: sso
    data_classification: internal
    software:
      vendor: Microsoft
      product: Exchange
      version: "15.2"
    ports: [tcp/25, tcp/587, tcp/993]
    owner_team: ict

  - id: hall-fs
    name: "City Hall file share"
    kind: file-share
    exposure: intranet
    host: fs.city-hall.corp
    network_id: city-hall-lan
    bind_ip: 10.10.129.11
    auth: sso
    data_classification: confidential
    software:
      vendor: Microsoft
      product: SMB
      version: "3.1.1"
    ports: [tcp/445]
    owner_team: records
    known_weakness: open-share

  - id: hall-idp
    name: "City Hall SSO"
    kind: identity
    exposure: intranet
    host: idp.city-hall.corp
    network_id: city-hall-lan
    bind_ip: 10.10.129.12
    auth: mfa
    data_classification: restricted
    software:
      vendor: Keycloak
      product: keycloak
      version: "24.0"
    ports: [tcp/443]
    owner_team: ict

links:
  - from_service: hall-idp
    to_service: bank-idp
    kind: trusts
    protocol: tcp/443
    encryption: sso-trust
    label: "federated SSO for payroll portal"
    attack_chain: ["scn-01"]
