id: city-hall
name: "City Hall"
kind: government
network_index: 1

description: |
  Муниципальный центр города. Принимает налоговые декларации,
  ведёт реестр жителей, рассылает уведомления. Зарплатный
  проект - в City First Bank (см. link trusts hall-idp -> bank-idp).
  City Hall также предоставляет городскую инфраструктуру DNS, NTP и log collection.

networks:
  - id: city-hall-dmz
    kind: dmz
    cidr: 10.1.1.0/24
  - id: city-hall-lan
    kind: lan
    cidr: 10.1.129.0/24
  - id: city-hall-mgmt
    kind: mgmt
    cidr: 10.1.253.0/24

services:
  - id: hall-web
    name: "City Hall portal"
    kind: web
    exposure: public
    host: portal.city-hall.corp
    network_id: city-hall-dmz
    bind_ip: 10.1.1.10
    auth: sso
    data_classification: public
    software:
      vendor: Apache
      product: httpd
      version: "2.4.57"
    ports: [tcp/443, tcp/80]
    owner_team: ict

  - id: hall-mail
    name: "City Hall mail"
    kind: mail
    exposure: intranet
    host: mail.city-hall.corp
    network_id: city-hall-lan
    bind_ip: 10.1.129.10
    auth: sso
    data_classification: internal
    software:
      vendor: Microsoft
      product: Exchange
      version: "15.2"
    ports: [tcp/25, tcp/587, tcp/993]
    owner_team: ict

  - id: hall-fs
    name: "City Hall file share"
    kind: file-share
    exposure: intranet
    host: fs.city-hall.corp
    network_id: city-hall-lan
    bind_ip: 10.1.129.11
    auth: sso
    data_classification: confidential
    software:
      vendor: Microsoft
      product: SMB
      version: "3.1.1"
    ports: [tcp/445]
    owner_team: records

  - id: hall-idp
    name: "City Hall SSO"
    kind: identity
    exposure: intranet
    host: idp.city-hall.corp
    network_id: city-hall-lan
    bind_ip: 10.1.129.12
    auth: mfa
    data_classification: restricted
    software:
      vendor: Keycloak
      product: keycloak
      version: "24.0"
    ports: [tcp/443]
    owner_team: ict

  - id: hall-dns
    name: "City DNS"
    kind: dns
    exposure: public
    host: dns.city-hall.corp
    network_id: city-hall-dmz
    bind_ip: 10.1.1.11
    auth: none
    data_classification: public
    software:
      vendor: ISC
      product: BIND
      version: "9.18"
    ports: [tcp/53, udp/53]
    owner_team: ict

  - id: hall-ntp
    name: "City NTP"
    kind: ntp
    exposure: intranet
    host: ntp.city-hall.corp
    network_id: city-hall-lan
    bind_ip: 10.1.129.13
    auth: none
    data_classification: internal
    software:
      vendor: NTPProject
      product: ntpd
      version: "4.2.8"
    ports: [udp/123]
    owner_team: ict

  - id: hall-log
    name: "City log collector"
    kind: log
    exposure: intranet
    host: log.city-hall.corp
    network_id: city-hall-lan
    bind_ip: 10.1.129.14
    auth: certificate
    data_classification: internal
    software:
      vendor: Elastic
      product: elasticsearch
      version: "8.11"
    ports: [tcp/9200]
    owner_team: soc

links:
  - from_service: hall-idp
    to_service: bank-idp
    kind: trusts
    protocol: tcp/443
    encryption: sso-trust
    label: "federated SSO for payroll portal"

  - from_service: hall-web
    to_service: hall-dns
    kind: m2m
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: hall-mail
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "mail logs"

  - from_service: hall-fs
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "file-share logs"

  - from_service: hall-idp
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "idp audit logs"
