id: bank
name: "City First Bank"
kind: finance

description: |
  Городской банк, обслуживает физлиц, бизнес и муниципалитет.
  Через bank-api ходят платежи от аптек, ритейла, транспорта, телекома,
  гостиниц, криптобиржи и провайдеров услуг. bank-db - критический актив
  (core ledger), защищён по сегменту corp.

networks:
  - id: bank-dmz
    kind: dmz
  - id: bank-lan
    kind: lan
  - id: bank-mgmt
    kind: mgmt

services:
  - id: bank-web
    name: "Bank customer portal"
    kind: web
    exposure: public
    host: portal.bank.corp
    network_id: bank-dmz
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: high

  - id: bank-api
    name: "Bank payments API"
    kind: api
    exposure: intranet
    host: api.bank.corp
    network_id: bank-lan
    auth: mfa
    data_classification: pci
    software:
      vendor: internal
      product: payments-gateway
      version: "3.2.0"
    ports: [tcp/443]
    criticality: critical

  - id: bank-idp
    name: "Bank SSO"
    kind: identity
    exposure: intranet
    host: idp.bank.corp
    network_id: bank-lan
    auth: mfa
    data_classification: restricted
    software:
      vendor: Okta
      product: okta
      version: unknown
    ports: [tcp/443]
    criticality: high

  - id: bank-db
    name: "Bank core ledger"
    kind: db
    exposure: intranet
    host: db.bank.corp
    network_id: bank-lan
    auth: certificate
    data_classification: pci
    software:
      vendor: Oracle
      product: DB
      version: "19.0.0.0"
    ports: [tcp/1521]
    criticality: critical

  - id: bank-backup
    name: "Bank backup server"
    kind: backup
    exposure: intranet
    host: backup.bank.corp
    network_id: bank-lan
    auth: certificate
    data_classification: restricted
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: high

links:
  - from_service: bank-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "portal DNS resolution"

  - from_service: bank-api
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "api DNS resolution"

  - from_service: bank-api
    to_service: bank-db
    kind: db-read
    protocol: tcp/1521
    encryption: tls
    label: "payments read core ledger"

  - from_service: bank-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "db audit logs"

  - from_service: bank-web
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "web audit logs"

  - from_service: bank-web
    to_service: bank-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO"

  - from_service: bank-api
    to_service: bank-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "API MFA via Bank SSO"

  - from_service: bank-api
    to_service: hall-ntp
    kind: ntp-query
    protocol: udp/123
    encryption: none
    label: "payments API time sync"

  - from_service: bank-backup
    to_service: bank-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "core ledger backup"

  - from_service: bank-backup
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "backup audit logs"
