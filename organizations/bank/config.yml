id: bank
name: "City First Bank"
kind: finance
network_index: 2

description: |
  Городской банк, обслуживает физлиц, бизнес и муниципалитет.
  Через bank-api ходят платежи от аптек, ритейла, транспорта, телекома,
  гостиниц, криптобиржи и провайдеров услуг. bank-db - критический актив
  (core ledger), защищён по сегменту corp.

networks:
  - id: bank-dmz
    kind: dmz
    cidr: 10.2.0.0/24
  - id: bank-lan
    kind: lan
    cidr: 10.2.128.0/24
  - id: bank-mgmt
    kind: mgmt
    cidr: 10.2.253.0/24

services:
  - id: bank-web
    name: "Bank customer portal"
    kind: web
    exposure: public
    host: portal.bank.corp
    network_id: bank-dmz
    bind_ip: 10.2.0.10
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: high

  - id: bank-api
    name: "Bank payments API"
    kind: api
    exposure: intranet
    host: api.bank.corp
    network_id: bank-lan
    bind_ip: 10.2.128.10
    auth: mfa
    data_classification: pci
    software:
      vendor: internal
      product: payments-gateway
      version: "3.2.0"
    ports: [tcp/443]
    criticality: critical

  - id: bank-idp
    name: "Bank SSO"
    kind: identity
    exposure: intranet
    host: idp.bank.corp
    network_id: bank-lan
    bind_ip: 10.2.128.11
    auth: mfa
    data_classification: restricted
    software:
      vendor: Okta
      product: okta
      version: unknown
    ports: [tcp/443]
    criticality: high

  - id: bank-db
    name: "Bank core ledger"
    kind: db
    exposure: intranet
    host: db.bank.corp
    network_id: bank-lan
    bind_ip: 10.2.128.12
    auth: certificate
    data_classification: pci
    software:
      vendor: Oracle
      product: DB
      version: "19.0.0.0"
    ports: [tcp/1521]
    criticality: critical

links:
  - from_service: bank-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "portal DNS resolution"

  - from_service: bank-api
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "api DNS resolution"

  - from_service: bank-api
    to_service: bank-db
    kind: db-read
    protocol: tcp/1521
    encryption: tls
    label: "payments read core ledger"

  - from_service: bank-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "db audit logs"

  - from_service: bank-web
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "web audit logs"
