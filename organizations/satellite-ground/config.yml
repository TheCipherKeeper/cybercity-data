id: satellite-ground
name: "City Satellite Ground Station"
kind: media-telecom

description: |
  Наземная станция спутниковой связи города. Поставляет новостной компании
  спутниковые снимки и данные, обеспечивает мобильного оператора резервными
  каналами связи, использует городскую инфраструктуру DNS, NTP и log collection.

networks:
  - id: satellite-ground-dmz
    kind: dmz
  - id: satellite-ground-lan
    kind: lan
  - id: satellite-ground-mgmt
    kind: mgmt

services:
  - id: sat-web
    name: "Ground station portal"
    kind: web
    exposure: public
    host: portal.satellite-ground.net
    network_id: satellite-ground-dmz
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: high

  - id: sat-control
    name: "Satellite control"
    kind: api
    exposure: intranet
    host: control.satellite-ground.net
    network_id: satellite-ground-lan
    auth: mfa
    data_classification: restricted
    software:
      vendor: Custom
      product: sat-control
      version: "unknown"
    ports: [tcp/443]
    criticality: critical

  - id: sat-telemetry
    name: "Satellite telemetry"
    kind: iot
    exposure: intranet
    host: telemetry.satellite-ground.net
    network_id: satellite-ground-lan
    auth: certificate
    data_classification: internal
    ports: [tcp/443]
    criticality: high

  - id: sat-db
    name: "Ground station telemetry DB"
    kind: db
    exposure: intranet
    host: db.satellite-ground.net
    network_id: satellite-ground-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: high

  - id: sat-backup
    name: "Ground station backup"
    kind: backup
    exposure: intranet
    host: backup.satellite-ground.net
    network_id: satellite-ground-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: high

links:
  - from_service: sat-web
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO"

  - from_service: sat-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: sat-web
    to_service: isp-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "portal primary DNS via ISP"

  - from_service: sat-control
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "control DNS resolution"

  - from_service: sat-control
    to_service: hall-ntp
    kind: ntp-query
    protocol: udp/123
    encryption: none
    label: "control time sync"

  - from_service: sat-telemetry
    to_service: news-cms
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "satellite imagery feed"

  - from_service: sat-control
    to_service: sat-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "orbital data"

  - from_service: sat-telemetry
    to_service: sat-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "downlink telemetry"

  - from_service: sat-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: sat-backup
    to_service: sat-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "telemetry DB backup"
