id: power
name: "City Power & Light"
kind: infra-utilities

description: |
  Городская энергетическая компания. Управляет подстанциями, распределительными
  сетями и telemetry. SCADA-шлюз и операторский HMI находятся в изолированном
  OT-сегменте. Имитационный принтер в сети OT используется для наполнения симуляции.

networks:
  - id: power-ot
    kind: ot
  - id: power-dmz
    kind: dmz
  - id: power-lan
    kind: lan
  - id: power-mgmt
    kind: mgmt

services:
  - id: power-web
    name: "Power customer portal"
    kind: web
    exposure: public
    host: portal.power.corp
    network_id: power-dmz
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.25.0"
    ports: [tcp/443, tcp/80]
    criticality: medium

  - id: power-scada
    name: "Power SCADA gateway"
    kind: ot
    exposure: ot
    host: scada.power.ot
    network_id: power-ot
    auth: certificate
    data_classification: restricted
    software:
      vendor: Siemens
      product: SIMATIC
      version: "16.0"
    ports: [tcp/102]
    criticality: critical

  - id: power-hmi
    name: "Power operator HMI"
    kind: ot
    exposure: ot
    host: hmi.power.ot
    network_id: power-ot
    auth: local
    data_classification: restricted
    software:
      vendor: Aveva
      product: intouch
      version: "unknown"
    ports: [tcp/443]
    criticality: high

  - id: power-db
    name: "Power telemetry DB"
    kind: db
    exposure: intranet
    host: db.power.corp
    network_id: power-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: high

  - id: power-emergency
    name: "Power emergency status API"
    kind: api
    exposure: intranet
    host: emergency.power.corp
    network_id: power-lan
    auth: mfa
    data_classification: restricted
    software:
      vendor: internal
      product: power-status
      version: "1.0.0"
    ports: [tcp/443]
    criticality: critical

  - id: power-backup
    name: "Power backup"
    kind: backup
    exposure: intranet
    host: backup.power.corp
    network_id: power-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: high

  - id: decoy-printer-01
    name: "Mock OT printer"
    kind: iot
    exposure: ot
    host: decoy-printer-01.power.ot
    network_id: power-ot
    ports: [tcp/9100, tcp/80]
    decoy:
      kind: printer
      fingerprint: realistic
      os_hint: linux-embedded
      note: "mock IoT endpoint for simulation density"

links:
  - from_service: power-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: power-web
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO via City Hall"

  - from_service: power-scada
    to_service: hall-ntp
    kind: ntp-query
    protocol: udp/123
    encryption: none
    label: "OT time sync"

  - from_service: power-scada
    to_service: power-db
    kind: db-write
    protocol: tcp/5432
    encryption: tls
    label: "SCADA writes telemetry"

  - from_service: power-hmi
    to_service: power-scada
    kind: api-call
    protocol: tcp/102
    encryption: none
    label: "HMI controls SCADA"

  - from_service: power-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: power-emergency
    to_service: power-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "grid status for emergency services"

  - from_service: power-backup
    to_service: power-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "telemetry DB backup"

  - from_service: decoy-printer-01
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "mock device DNS resolution"
