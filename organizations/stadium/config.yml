id: stadium
name: "City Sports Stadium"
kind: retail

description: |
  Городской спортивный стадион и концертная арена. Продажа билетов,
  fan Wi-Fi, видеонаблюдение и управление мероприятиями.

networks:
  - id: stadium-dmz
    kind: dmz
  - id: stadium-lan
    kind: lan
  - id: stadium-mgmt
    kind: mgmt

services:
  - id: stadium-web
    name: "Stadium website"
    kind: web
    exposure: public
    host: portal.stadium.retail
    network_id: stadium-dmz
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: high

  - id: stadium-tickets
    name: "Stadium ticketing"
    kind: web
    exposure: intranet
    host: tickets.stadium.retail
    network_id: stadium-lan
    auth: sso
    data_classification: confidential
    software:
      vendor: Custom
      product: ticketing
      version: "unknown"
    ports: [tcp/443]
    criticality: high

  - id: stadium-cctv
    name: "Stadium CCTV"
    kind: cctv
    exposure: intranet
    host: cctv.stadium.retail
    network_id: stadium-lan
    auth: local
    data_classification: internal
    software:
      vendor: Hikvision
      product: ivms
      version: "unknown"
    ports: [tcp/443]
    criticality: medium

  - id: stadium-wifi
    name: "Stadium fan Wi-Fi"
    kind: iot
    exposure: public
    host: wifi.stadium.retail
    network_id: stadium-dmz
    auth: none
    data_classification: public
    ports: [tcp/80, tcp/443, udp/53]
    criticality: low

  - id: stadium-db
    name: "Stadium events DB"
    kind: db
    exposure: intranet
    host: db.stadium.retail
    network_id: stadium-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: high

  - id: stadium-backup
    name: "Stadium backup"
    kind: backup
    exposure: intranet
    host: backup.stadium.retail
    network_id: stadium-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: high

  - id: stadium-idp
    name: "Stadium SSO"
    kind: identity
    exposure: intranet
    host: idp.stadium.retail
    network_id: stadium-lan
    auth: mfa
    data_classification: restricted
    software:
      vendor: Keycloak
      product: keycloak
      version: "24.0"
    ports: [tcp/443]
    criticality: high

links:
  - from_service: stadium-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: stadium-web
    to_service: taxi-app
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "fan ride booking"

  - from_service: stadium-tickets
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "ticketing DNS resolution"

  - from_service: stadium-tickets
    to_service: stadium-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "events and tickets"

  - from_service: stadium-tickets
    to_service: bank-api
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "payment processing"

  - from_service: stadium-cctv
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "CCTV DNS resolution"

  - from_service: stadium-wifi
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "captive portal DNS"

  - from_service: stadium-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: stadium-web
    to_service: stadium-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO"

  - from_service: stadium-tickets
    to_service: stadium-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "ticketing SSO"

  - from_service: stadium-backup
    to_service: stadium-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "events DB backup"

  - from_service: stadium-tickets
    to_service: msp-av
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "AV agent heartbeat"

  - from_service: stadium-tickets
    to_service: msp-ticketing
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "raise support ticket with MSP"
