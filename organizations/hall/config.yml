id: hall
name: "City Hall"
kind: government

description: |
  Муниципальный центр города. Принимает налоговые декларации,
  ведёт реестр жителей, рассылает уведомления. Зарплатный
  проект - в City First Bank (см. link trusts hall-idp -> bank-idp).
  City Hall также предоставляет городскую инфраструктуру DNS, NTP и log collection.

networks:
  - id: hall-dmz
    kind: dmz
  - id: hall-lan
    kind: lan
  - id: hall-mgmt
    kind: mgmt

services:
  - id: hall-web
    name: "City Hall portal"
    kind: web
    exposure: public
    host: portal.hall.corp
    network_id: hall-dmz
    auth: sso
    data_classification: public
    software:
      vendor: Apache
      product: httpd
      version: "2.4.57"
    ports: [tcp/443, tcp/80]
    criticality: high

  - id: hall-mail
    name: "City Hall mail"
    kind: mail
    exposure: intranet
    host: mail.hall.corp
    network_id: hall-lan
    auth: sso
    data_classification: internal
    software:
      vendor: Microsoft
      product: Exchange
      version: "15.2"
    ports: [tcp/25, tcp/587, tcp/993]
    criticality: medium

  - id: hall-fs
    name: "City Hall file share"
    kind: file-share
    exposure: intranet
    host: fs.hall.corp
    network_id: hall-lan
    auth: sso
    data_classification: confidential
    software:
      vendor: Microsoft
      product: SMB
      version: "3.1.1"
    ports: [tcp/445]
    criticality: medium

  - id: hall-idp
    name: "City Hall SSO"
    kind: identity
    exposure: intranet
    host: idp.hall.corp
    network_id: hall-lan
    auth: mfa
    data_classification: restricted
    software:
      vendor: Keycloak
      product: keycloak
      version: "24.0"
    ports: [tcp/443]
    criticality: medium

  - id: hall-dns
    name: "City DNS"
    kind: dns
    exposure: public
    host: dns.hall.corp
    network_id: hall-dmz
    auth: none
    data_classification: public
    software:
      vendor: ISC
      product: BIND
      version: "9.18"
    ports: [tcp/53, udp/53]
    criticality: medium

  - id: hall-ntp
    name: "City NTP"
    kind: ntp
    exposure: intranet
    host: ntp.hall.corp
    network_id: hall-lan
    auth: none
    data_classification: internal
    software:
      vendor: NTPProject
      product: ntpd
      version: "4.2.8"
    ports: [udp/123]
    criticality: medium

  - id: hall-log
    name: "City log collector"
    kind: log
    exposure: intranet
    host: log.hall.corp
    network_id: hall-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: Elastic
      product: elasticsearch
      version: "8.11"
    ports: [tcp/9200]
    criticality: high

links:
  - from_service: hall-idp
    to_service: bank-idp
    kind: trusts
    protocol: tcp/443
    encryption: sso-trust
    label: "federated SSO for payroll portal"

  - from_service: hall-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: hall-mail
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "mail logs"

  - from_service: hall-fs
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "file-share logs"

  - from_service: hall-idp
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "idp audit logs"

  - from_service: hall-web
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO"

  - from_service: hall-mail
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "mail SSO"

  - from_service: hall-fs
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "file share SSO"
