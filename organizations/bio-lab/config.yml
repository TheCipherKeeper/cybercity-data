id: bio-lab
name: "City Biosafety Laboratory"
kind: healthcare
network_index: 32

description: |
  Городская биобезопасная лаборатория уровня BSL-3. Проводит исследования
  в области вирусологии, генетики и вакцин. Связана с больницей, поликлиникой
  и центром экстренного реагирования.

networks:
  - id: bio-lab-dmz
    kind: dmz
    cidr: 10.32.1.0/24
  - id: bio-lab-lan
    kind: lan
    cidr: 10.32.129.0/24
  - id: bio-lab-mgmt
    kind: mgmt
    cidr: 10.32.253.0/24

services:
  - id: bio-web
    name: "Bio-lab portal"
    kind: web
    exposure: public
    host: portal.bio-lab.med
    network_id: bio-lab-dmz
    bind_ip: 10.32.1.10
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: medium

  - id: bio-lims
    name: "Bio-lab LIMS"
    kind: web
    exposure: intranet
    host: lims.bio-lab.med
    network_id: bio-lab-lan
    bind_ip: 10.32.129.10
    auth: sso
    data_classification: phi
    software:
      vendor: Custom
      product: bio-lims
      version: "unknown"
    ports: [tcp/443]
    criticality: high

  - id: bio-sequencer
    name: "Gene sequencer"
    kind: iot
    exposure: intranet
    host: seq.bio-lab.med
    network_id: bio-lab-lan
    bind_ip: 10.32.129.11
    auth: certificate
    data_classification: phi
    software:
      vendor: Illumina
      product: basespace
      version: "unknown"
    ports: [tcp/443]
    criticality: high

  - id: bio-db
    name: "Bio-lab samples DB"
    kind: db
    exposure: intranet
    host: db.bio-lab.med
    network_id: bio-lab-lan
    bind_ip: 10.32.129.12
    auth: certificate
    data_classification: phi
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: critical

  - id: bio-backup
    name: "Bio-lab backup"
    kind: backup
    exposure: intranet
    host: backup.bio-lab.med
    network_id: bio-lab-lan
    bind_ip: 10.32.129.13
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: high

links:
  - from_service: bio-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: bio-lims
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "LIMS DNS resolution"

  - from_service: bio-lims
    to_service: bio-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "sample records"

  - from_service: bio-sequencer
    to_service: bio-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "sequencing metadata"

  - from_service: bio-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: bio-backup
    to_service: bio-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "samples DB backup"
