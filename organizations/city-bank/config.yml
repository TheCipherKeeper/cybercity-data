id: city-bank
name: "City First Bank"
kind: finance
segment: corp

description: |
  Городской банк, обслуживает физлиц, бизнес и муниципалитет.
  Через bank-api ходят платежи от других организаций (аптека - см. link).
  bank-db - критический актив (core ledger), защищён по сегменту corp.

third_party:
  - name: City Hall
    role: payroll customer
    note: trusts от hall-idp к bank-idp
  - name: City Pharmacy Chain
    role: payments customer
    note: POS бьёт по bank-api (api-call)

tags:
  - pci
  - high-value-target

regulated:
  - pci-dss
  - sox

notes:
  - "bank-db никогда не торчит наружу - даже api-call идёт через bank-api"
  - "bank-idp - главная цель credential stuffing в сценариях"
  - "portal.city-bank.corp - публичный web, частый entry point"

services:
  - id: bank-web
    name: "Bank customer portal"
    kind: web
    exposure: public
    host: portal.city-bank.corp
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    owner_team: digital

  - id: bank-api
    name: "Bank payments API"
    kind: api
    exposure: intranet
    host: api.city-bank.corp
    auth: mfa
    data_classification: pci
    software:
      vendor: internal
      product: payments-gateway
      version: "3.2.0"
    ports: [tcp/443]
    owner_team: payments

  - id: bank-idp
    name: "Bank SSO"
    kind: identity
    exposure: intranet
    host: idp.city-bank.corp
    auth: mfa
    data_classification: restricted
    software:
      vendor: Okta
      product: okta
      version: unknown
    ports: [tcp/443]
    owner_team: iam

  - id: bank-db
    name: "Bank core ledger"
    kind: db
    exposure: intranet
    host: db.city-bank.corp
    auth: certificate
    data_classification: pci
    software:
      vendor: Oracle
      product: DB
      version: "19.0.0.0"
    ports: [tcp/1521]
    owner_team: dba
