id: city-bank
name: "City First Bank"
kind: finance
network_index: 2

description: |
  Городской банк, обслуживает физлиц, бизнес и муниципалитет.
  Через bank-api ходят платежи от других организаций (аптека - см. link).
  bank-db - критический актив (core ledger), защищён по сегменту corp.

third_party:
  - name: City Hall
    role: payroll customer
    note: trusts от hall-idp к bank-idp
  - name: City Pharmacy Chain
    role: payments customer
    note: POS бьёт по bank-api (api-call)

tags:
  - pci
  - high-value-target

regulated:
  - pci-dss
  - sox

notes:
  - "bank-db не торчит наружу - api-call идёт через bank-api"
  - "bank-idp - федеративный SSO для муниципалитета"
  - "portal.city-bank.corp - публичный web портал"

networks:
  - id: city-bank-dmz
    kind: dmz
    cidr: 10.2.0.0/24
  - id: city-bank-lan
    kind: lan
    cidr: 10.2.128.0/24
  - id: city-bank-mgmt
    kind: mgmt
    cidr: 10.2.253.0/24

services:
  - id: bank-web
    name: "Bank customer portal"
    kind: web
    exposure: public
    host: portal.city-bank.corp
    network_id: city-bank-dmz
    bind_ip: 10.2.0.10
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    owner_team: digital

  - id: bank-api
    name: "Bank payments API"
    kind: api
    exposure: intranet
    host: api.city-bank.corp
    network_id: city-bank-lan
    bind_ip: 10.2.128.10
    auth: mfa
    data_classification: pci
    software:
      vendor: internal
      product: payments-gateway
      version: "3.2.0"
    ports: [tcp/443]
    owner_team: payments

  - id: bank-idp
    name: "Bank SSO"
    kind: identity
    exposure: intranet
    host: idp.city-bank.corp
    network_id: city-bank-lan
    bind_ip: 10.2.128.11
    auth: mfa
    data_classification: restricted
    software:
      vendor: Okta
      product: okta
      version: unknown
    ports: [tcp/443]
    owner_team: iam

  - id: bank-db
    name: "Bank core ledger"
    kind: db
    exposure: intranet
    host: db.city-bank.corp
    network_id: city-bank-lan
    bind_ip: 10.2.128.12
    auth: certificate
    data_classification: pci
    software:
      vendor: Oracle
      product: DB
      version: "19.0.0.0"
    ports: [tcp/1521]
    owner_team: dba

links:
  - from_service: bank-web
    to_service: hall-dns
    kind: m2m
    protocol: udp/53
    encryption: none
    label: "portal DNS resolution"

  - from_service: bank-api
    to_service: hall-dns
    kind: m2m
    protocol: udp/53
    encryption: none
    label: "api DNS resolution"

  - from_service: bank-api
    to_service: bank-db
    kind: db-read
    protocol: tcp/1521
    encryption: tls
    label: "payments read core ledger"

  - from_service: bank-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "db audit logs"

  - from_service: bank-web
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "web audit logs"
