id: city-pharmacy
name: "City Pharmacy Chain"
kind: healthcare
network_index: 3

description: |
  Сеть городских аптек. POS-терминалы списывают оплату через bank-api.
  Хранит рецепты и историю покупок (phar-db) - данные под защитой
  healthcare-профиля.

networks:
  - id: city-pharmacy-dmz
    kind: dmz
    cidr: 10.3.1.0/24
  - id: city-pharmacy-lan
    kind: lan
    cidr: 10.3.129.0/24
  - id: city-pharmacy-mgmt
    kind: mgmt
    cidr: 10.3.253.0/24

services:
  - id: phar-pos
    name: "Pharmacy POS"
    kind: pos
    exposure: intranet
    host: pos.city-pharmacy.corp
    network_id: city-pharmacy-lan
    bind_ip: 10.3.129.10
    auth: local
    data_classification: phi
    software:
      vendor: Square
      product: Square-POS
      version: "5.0"
    ports: [tcp/443]
    criticality: high

  - id: phar-idp
    name: "Pharmacy SSO"
    kind: identity
    exposure: intranet
    host: idp.city-pharmacy.corp
    network_id: city-pharmacy-lan
    bind_ip: 10.3.129.11
    auth: sso
    data_classification: restricted
    software:
      vendor: Auth0
      product: auth0
      version: unknown
    ports: [tcp/443]
    criticality: high

  - id: phar-db
    name: "Pharmacy records"
    kind: db
    exposure: intranet
    host: db.city-pharmacy.corp
    network_id: city-pharmacy-lan
    bind_ip: 10.3.129.12
    auth: certificate
    data_classification: phi
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: critical

links:
  - from_service: phar-pos
    to_service: bank-api
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "card-present payment authorisation"

  - from_service: phar-pos
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "POS DNS resolution"

  - from_service: phar-idp
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "idp DNS resolution"

  - from_service: phar-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "pharmacy db logs"

  - from_service: phar-pos
    to_service: phar-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "POS reads prescription db"
