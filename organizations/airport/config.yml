id: airport
name: "City Regional Airport"
kind: infra-utilities
network_index: 20

description: |
  Городской региональный аэропорт. Пассажирский портал, система
  управления зданием (BMS), CCTV, информация о рейсах и оперативный API
  для координации с центром экстренного реагирования.

networks:
  - id: airport-dmz
    kind: dmz
    cidr: 10.20.1.0/24
  - id: airport-lan
    kind: lan
    cidr: 10.20.129.0/24
  - id: airport-mgmt
    kind: mgmt
    cidr: 10.20.253.0/24

services:
  - id: airport-web
    name: "Airport portal"
    kind: web
    exposure: public
    host: portal.airport.corp
    network_id: airport-dmz
    bind_ip: 10.20.1.10
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: high

  - id: airport-bms
    name: "Airport BMS"
    kind: iot
    exposure: intranet
    host: bms.airport.corp
    network_id: airport-lan
    bind_ip: 10.20.129.10
    auth: local
    data_classification: internal
    software:
      vendor: Tridium
      product: niagara
      version: "4.12"
    ports: [tcp/443]
    criticality: high

  - id: airport-cctv
    name: "Airport CCTV"
    kind: cctv
    exposure: intranet
    host: cctv.airport.corp
    network_id: airport-lan
    bind_ip: 10.20.129.11
    auth: local
    data_classification: internal
    software:
      vendor: Hikvision
      product: ivms
      version: "unknown"
    ports: [tcp/443]
    criticality: medium

  - id: airport-db
    name: "Airport flight DB"
    kind: db
    exposure: intranet
    host: db.airport.corp
    network_id: airport-lan
    bind_ip: 10.20.129.12
    auth: certificate
    data_classification: internal
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: high

  - id: airport-wifi
    name: "Airport passenger Wi-Fi"
    kind: iot
    exposure: public
    host: wifi.airport.corp
    network_id: airport-dmz
    bind_ip: 10.20.1.11
    auth: none
    data_classification: public
    ports: [tcp/80, tcp/443, udp/53]
    criticality: low

  - id: airport-backup
    name: "Airport backup"
    kind: backup
    exposure: intranet
    host: backup.airport.corp
    network_id: airport-lan
    bind_ip: 10.20.129.13
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: high

  - id: airport-ops
    name: "Airport operations API"
    kind: api
    exposure: intranet
    host: ops.airport.corp
    network_id: airport-lan
    bind_ip: 10.20.129.14
    auth: mfa
    data_classification: internal
    software:
      vendor: internal
      product: airport-ops
      version: "1.0.0"
    ports: [tcp/443]
    criticality: high

links:
  - from_service: airport-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: airport-web
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO via City Hall"

  - from_service: airport-bms
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "BMS DNS resolution"

  - from_service: airport-cctv
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "CCTV DNS resolution"

  - from_service: airport-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: airport-bms
    to_service: airport-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "HVAC telemetry"

  - from_service: airport-cctv
    to_service: airport-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "video metadata"

  - from_service: airport-backup
    to_service: airport-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "flight DB backup"

  - from_service: airport-wifi
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "captive portal DNS"

  - from_service: airport-ops
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "ops API DNS resolution"
