id: news
name: "City Broadcasting & News"
kind: media-telecom
network_index: 23

description: |
  Городская телерадиокомпания и новостной портал. Публикует новости,
  ведёт стриминг и архив видеоматериалов.

networks:
  - id: news-dmz
    kind: dmz
    cidr: 10.23.1.0/24
  - id: news-lan
    kind: lan
    cidr: 10.23.129.0/24
  - id: news-mgmt
    kind: mgmt
    cidr: 10.23.253.0/24

services:
  - id: news-web
    name: "News portal"
    kind: web
    exposure: public
    host: portal.news.media
    network_id: news-dmz
    bind_ip: 10.23.1.10
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: high

  - id: news-cms
    name: "News CMS"
    kind: web
    exposure: intranet
    host: cms.news.media
    network_id: news-lan
    bind_ip: 10.23.129.10
    auth: sso
    data_classification: internal
    software:
      vendor: Custom
      product: news-cms
      version: "unknown"
    ports: [tcp/443]
    criticality: high

  - id: news-stream
    name: "News streaming"
    kind: web
    exposure: public
    host: stream.news.media
    network_id: news-dmz
    bind_ip: 10.23.1.11
    auth: none
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/1935]
    criticality: medium

  - id: news-db
    name: "News articles DB"
    kind: db
    exposure: intranet
    host: db.news.media
    network_id: news-lan
    bind_ip: 10.23.129.11
    auth: certificate
    data_classification: internal
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: medium

  - id: news-backup
    name: "News backup"
    kind: backup
    exposure: intranet
    host: backup.news.media
    network_id: news-lan
    bind_ip: 10.23.129.12
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: medium

links:
  - from_service: news-web
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "portal SSO"

  - from_service: news-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: news-web
    to_service: isp-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "portal primary DNS via ISP"

  - from_service: news-cms
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "CMS DNS resolution"

  - from_service: news-cms
    to_service: hall-ntp
    kind: ntp-query
    protocol: udp/123
    encryption: none
    label: "CMS time sync"

  - from_service: news-cms
    to_service: news-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "articles archive"

  - from_service: news-stream
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "streaming DNS resolution"

  - from_service: news-stream
    to_service: news-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "video metadata"

  - from_service: news-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: news-backup
    to_service: news-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "articles DB backup"
