id: national-guard
name: "City National Guard Base"
kind: government

description: |
  Городская база национальной гвардии. Обеспечивает правопорядок,
  защиту критичной инфраструктуры и реагирование на чрезвычайные ситуации.
  Сеть изолирована, но CAD гвардии связан с полицейским CAD и диспетчеризацией
  единого центра ЧС для совместных операций.

networks:
  - id: national-guard-dmz
    kind: dmz
  - id: national-guard-lan
    kind: lan
  - id: national-guard-mgmt
    kind: mgmt

services:
  - id: guard-web
    name: "National guard public portal"
    kind: web
    exposure: public
    host: portal.national-guard.gov
    network_id: national-guard-dmz
    auth: sso
    data_classification: public
    software:
      vendor: nginx
      product: nginx
      version: "1.24.0"
    ports: [tcp/443, tcp/80]
    criticality: medium

  - id: guard-cad
    name: "Guard dispatch CAD"
    kind: web
    exposure: intranet
    host: cad.national-guard.gov
    network_id: national-guard-lan
    auth: mfa
    data_classification: restricted
    software:
      vendor: Custom
      product: guard-cad
      version: "unknown"
    ports: [tcp/443]
    criticality: critical

  - id: guard-cctv
    name: "Base perimeter CCTV"
    kind: cctv
    exposure: intranet
    host: cctv.national-guard.gov
    network_id: national-guard-lan
    auth: local
    data_classification: restricted
    software:
      vendor: Hikvision
      product: ivms
      version: "unknown"
    ports: [tcp/443]
    criticality: high

  - id: guard-db
    name: "Guard personnel DB"
    kind: db
    exposure: intranet
    host: db.national-guard.gov
    network_id: national-guard-lan
    auth: certificate
    data_classification: restricted
    software:
      vendor: PostgreSQL
      product: postgresql
      version: "15.4"
    ports: [tcp/5432]
    criticality: high

  - id: guard-backup
    name: "Guard backup"
    kind: backup
    exposure: intranet
    host: backup.national-guard.gov
    network_id: national-guard-lan
    auth: certificate
    data_classification: internal
    software:
      vendor: Veeam
      product: backup-replication
      version: "12.0"
    ports: [tcp/9392]
    criticality: high

links:
  - from_service: guard-web
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "public portal DNS resolution"

  - from_service: guard-cad
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "CAD DNS resolution"

  - from_service: guard-cad
    to_service: guard-db
    kind: db-read
    protocol: tcp/5432
    encryption: tls
    label: "personnel and missions"

  - from_service: guard-cctv
    to_service: hall-dns
    kind: dns-query
    protocol: udp/53
    encryption: none
    label: "CCTV DNS resolution"

  - from_service: guard-db
    to_service: hall-log
    kind: log-sink
    protocol: tcp/9200
    encryption: tls
    label: "DB audit logs"

  - from_service: guard-backup
    to_service: guard-db
    kind: backup-of
    protocol: tcp/9392
    encryption: tls
    label: "personnel DB backup"

  - from_service: guard-cad
    to_service: police-cad
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "joint public safety operations"

  - from_service: guard-cad
    to_service: eoc-dispatch
    kind: api-call
    protocol: tcp/443
    encryption: tls
    label: "emergency coordination with EOC"

  - from_service: guard-web
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "public portal SSO via City Hall"

  - from_service: guard-cad
    to_service: hall-idp
    kind: auth
    protocol: tcp/443
    encryption: tls
    label: "CAD MFA via City Hall"
